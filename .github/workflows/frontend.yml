name: Build & Push Frontend to ECR

on:
  push:
    branches: [ "main" ]
    paths:
      - "frontend/**"

  workflow_dispatch:   # ✅ NEW: Manual trigger added

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-south-1
      ECR_REPOSITORY: frontend

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Docker Image
      run: |
        cd frontend
        docker build -t $ECR_REPOSITORY .

    - name: Tag Docker Image
      run: |
        docker tag $ECR_REPOSITORY:latest ${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY}:latest

    - name: Push to Amazon ECR
      run: |
        docker push ${{ steps.login-ecr.outputs.registry }}/${ECR_REPOSITORY}:latest

    - name: Verify Image in ECR   # ✅ NEW: Debug step
      run: |
        aws ecr describe-images --repository-name $ECR_REPOSITORY --region $AWS_REGION
